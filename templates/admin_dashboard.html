{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="page-title">Admin Dashboard</h2>

        <div class="d-flex gap-2">

            <a href="/products/marketplace"
               class="btn btn-outline-light">
                Marketplace
            </a>

            <button class="btn btn-outline-danger"
                    onclick="logout()">
                Logout
            </button>

        </div>

    </div>


    <!-- USERS -->
    <div class="glass-card p-4 mb-4">

        <h4 class="mb-3">Users</h4>

        <table class="table table-hover">

            <thead>
                <tr>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="usersTable"></tbody>

        </table>

    </div>



    <!-- PRODUCTS -->
    <div class="glass-card p-4 mb-4">

        <h4 class="mb-3">Products</h4>

        <table class="table table-hover">

            <thead>
                <tr>
                    <th>Title</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="productsTable"></tbody>

        </table>

    </div>



    <!-- TRANSACTIONS -->
    <div class="glass-card p-4">

        <h4 class="mb-3">Transactions</h4>

        <table class="table table-hover">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Buyer</th>
                    <th>Product</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Timestamp</th>
                </tr>
            </thead>

            <tbody id="transactionsTable"></tbody>

        </table>

    </div>

</div>



<script>

const token = localStorage.getItem("token");

if (!token)
{
    window.location.href = "/login";
}



// SAFE FETCH FUNCTION
async function safeFetch(url, method="GET")
{
    try
    {
        const response = await fetch(url,
        {
            method: method,
            headers:
            {
                "Authorization": "Bearer " + token
            }
        });

        if (response.status === 401 || response.status === 422)
        {
            localStorage.removeItem("token");
            window.location.href = "/login";
            return null;
        }

        return await response.json();
    }
    catch(error)
    {
        console.error(error);
        return null;
    }
}



// ========================
// DELETE USER
// ========================
async function deleteUser(userId)
{
    if (!confirm("Delete this user?")) return;

    await safeFetch("/api/admin/users/" + userId, "DELETE");

    loadUsers();
}



// ========================
// DELETE PRODUCT
// ========================
async function deleteProduct(productId)
{
    if (!confirm("Delete this product?")) return;

    await safeFetch("/api/admin/products/" + productId, "DELETE");

    loadProducts();
}



// ========================
// LOAD USERS
// ========================
async function loadUsers()
{
    const users = await safeFetch("/api/admin/users");

    if (!users) return;

    const table = document.getElementById("usersTable");

    table.innerHTML = "";

    users.forEach(user =>
    {
        table.innerHTML += `
        <tr>
            <td>${user.email}</td>
            <td>${user.role}</td>
            <td>
                <button class="btn btn-sm btn-danger"
                        onclick="deleteUser(${user.id})">
                    Delete
                </button>
            </td>
        </tr>`;
    });
}



// ========================
// LOAD PRODUCTS
// ========================
async function loadProducts()
{
    const products = await safeFetch("/api/admin/products");

    if (!products) return;

    const table = document.getElementById("productsTable");

    table.innerHTML = "";

    products.forEach(product =>
    {
        table.innerHTML += `
        <tr>
            <td>${product.title}</td>
            <td>₹ ${product.price}</td>
            <td>
                <button class="btn btn-sm btn-danger"
                        onclick="deleteProduct(${product.id})">
                    Delete
                </button>
            </td>
        </tr>`;
    });
}



// ========================
// LOAD TRANSACTIONS
// ========================
async function loadTransactions()
{
    const transactions = await safeFetch("/api/admin/transactions");

    if (!transactions) return;

    const table = document.getElementById("transactionsTable");

    table.innerHTML = "";

    if (!transactions.length)
    {
        table.innerHTML =
        "<tr><td colspan='6'>No transactions yet.</td></tr>";
        return;
    }

    transactions.forEach(t =>
    {
        table.innerHTML += `
        <tr>
            <td>${t.id}</td>
            <td>${t.buyer_id}</td>
            <td>${t.product_id}</td>
            <td>₹ ${t.amount ?? "-"}</td>
            <td>${t.status ?? "completed"}</td>
            <td>${t.timestamp}</td>
        </tr>`;
    });
}



// INIT
loadUsers();
loadProducts();
loadTransactions();



// LOGOUT
function logout()
{
    localStorage.removeItem("token");
    window.location.href = "/";
}

</script>

{% endblock %}
