<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>ForgeHub</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>


<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark glass-nav">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            ForgeHub
        </a>

        <div class="ms-auto d-flex align-items-center gap-3">

            <a href="/" class="nav-link text-light">
                Home
            </a>

            <!-- NEW MARKETPLACE LINK -->
            <a href="/products/marketplace" class="nav-link text-light">
                Marketplace
            </a>

            <a href="/login" class="nav-link text-light">
                Login
            </a>

            <a href="/register" class="nav-link text-light">
                Register
            </a>

            <!-- THEME BUTTON -->
            <button id="themeToggle"
                    class="btn btn-outline-light btn-sm">
                🌙
            </button>

        </div>

    </div>

</nav>


<!-- MAIN CONTENT -->
<div class="container py-5">

    {% block content %}
    {% endblock %}

</div>


<!-- FOOTER -->
<footer class="text-center text-muted py-4">

    ForgeHub © 2026 — Digital Asset Marketplace

</footer>


<!-- THEME SCRIPT -->
<script>

document.addEventListener("DOMContentLoaded", function ()
{

    const toggleBtn = document.getElementById("themeToggle");

    if (!toggleBtn) return;

    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "light")
    {
        document.body.classList.add("light-mode");
        toggleBtn.innerHTML = "☀️";
    }
    else
    {
        toggleBtn.innerHTML = "🌙";
    }

    toggleBtn.addEventListener("click", function ()
    {
        document.body.classList.toggle("light-mode");

        if (document.body.classList.contains("light-mode"))
        {
            localStorage.setItem("theme", "light");
            toggleBtn.innerHTML = "☀️";
        }
        else
        {
            localStorage.setItem("theme", "dark");
            toggleBtn.innerHTML = "🌙";
        }
    });

});

</script>


</body>
</html>
