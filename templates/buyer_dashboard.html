{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Marketplace</h2>

        <div>

            <a href="/cart" class="btn btn-outline-light me-2">
                🛒 View Cart
            </a>

            <button onclick="logout()"
                    class="btn btn-danger">
                Logout
            </button>

        </div>

    </div>



    <!-- PRODUCTS GRID -->
    <div class="row" id="products"></div>


</div>



<script>

const token = localStorage.getItem("token");


// ===============================
// CHECK LOGIN
// ===============================
if (!token)
{
    window.location.href = "/login";
}



// ===============================
// LOAD PRODUCTS
// ===============================
async function loadProducts()
{

    const res = await fetch("/products/");

    const products = await res.json();

    let html = "";

    products.forEach(product =>
    {

        html += `

        <div class="col-md-3 mb-4">

            <div class="card shadow-sm h-100"
                 style="background:#1e293b; color:white; border-radius:12px;">

                <img src="${product.image_url || 'https://via.placeholder.com/300'}"
                     style="height:200px; object-fit:cover; border-radius:12px 12px 0 0;">


                <div class="card-body d-flex flex-column">

                    <h6>${product.title}</h6>

                    <small class="text-info">
                        ${product.category}
                    </small>

                    <h5 class="text-success mt-2">
                        ₹${product.price}
                    </h5>


                    <button onclick="addToCart(${product.id})"
                            class="btn btn-dark mt-auto">

                        Add to Cart

                    </button>

                </div>

            </div>

        </div>

        `;

    });

    document.getElementById("products").innerHTML = html;

}



// ===============================
// ADD TO CART
// ===============================
async function addToCart(productId)
{

    const res = await fetch("/api/cart/add/" + productId,
    {
        method: "POST",

        headers:
        {
            "Authorization": "Bearer " + token
        }
    });


    if(res.ok)
    {
        alert("Product added to cart");
    }
    else
    {
        alert("Failed to add to cart");
    }

}



// ===============================
// LOGOUT
// ===============================
function logout()
{
    localStorage.removeItem("token");

    window.location.href = "/login";
}



// INITIAL LOAD
loadProducts();

</script>


{% endblock %}
